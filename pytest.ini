[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = archive .git .venv __pycache__ *.egg
addopts = -p asyncio --strict-markers --strict-config
filterwarnings =
    ignore::DeprecationWarning:beartype.meta

markers =
    asyncio: marks tests as async
    story: marks test with user story mapping (format: "Epic - User story title")
    unit: marks tests that use in-memory client (fast, deterministic)
    integration: marks tests that call MCP via HTTP
    e2e: marks tests that require full system setup
    three_variant: marks tests that have unit/integration/e2e variants
    mock_only: marks tests that use mocks instead of real services
    slow: marks tests as slow (deselect with '-m "not slow"')
    regression: marks regression coverage for bug fixes
    dependency: marks test dependencies (pytest-dependency)
    order: controls test execution order (pytest-order)
    full_workflow: marks tests as full workflow runs
    coverage_cli: CLI adapter coverage tests
    coverage_mcp: MCP adapter coverage tests
    coverage_workflow: Workflow tool coverage tests
    coverage_e2e: End-to-end MCP client tests
    error_handling: Error handling tests
    performance: Performance tests
    live_services: Tests requiring live Supabase/AuthKit
    http: HTTP tests
