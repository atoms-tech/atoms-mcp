[project]
name = "atoms-mcp"
version = "0.1.0"
description = "Atoms MCP Server - Model Context Protocol server for Atoms workspace management"
requires-python = ">=3.11"
readme = "README.md"
license = "MIT"
dependencies = [ "fastmcp>=2.13.0.1", "py-key-value-aio>=0.2.0", "fastapi>=0.104.0", "uvicorn[standard]>=0.24.0", "supabase>=2.5.0", "psycopg2-binary>=2.9.9", "google-cloud-aiplatform>=1.49.0", "aiohttp>=3.8.0", "workos>=1.0.0", "PyJWT>=2.8.0", "cryptography>=41.0.0", "tqdm>=4.66.0", "rapidfuzz>=3.10.0", "pydantic[email]>=2.11.7,<3.0.0", "pydantic-settings>=2.3.0", "httpx>=0.28.1,<1.0.0", "PyYAML>=6.0", "psutil>=5.9.0", "typing-extensions>=4.12.2", "playwright>=1.40.0", "pheno-sdk @ git+file:///Users/kooshapari/temp-PRODVERCEL/485/kush/pheno-sdk", "sqlalchemy>=2.0.44",]
[[project.authors]]
name = "Atoms Team"

[build-system]
requires = [ "hatchling>=1.21.0", "hatch-vcs>=0.3.0",]
build-backend = "hatchling.build"

[project.optional-dependencies]
dev = [ "pytest>=7.4.0", "pytest-asyncio>=0.21.0", "pytest-cov>=4.1.0", "pytest-xdist>=3.3.0", "pytest-mock>=3.11.0", "pytest-dependency>=0.5.1", "pytest-benchmark>=4.0.0", "pytest-watch>=4.2.0", "ruff>=0.8.0", "black>=24.0.0", "isort>=5.13.0", "coverage>=7.4.0", "graphviz>=0.20.1", "bandit[toml]>=1.7.6", "safety>=3.0.0", "types-requests>=2.31.0.0", "types-python-dateutil>=2.9.0.20240316", "types-PyYAML>=6.0.0", "locust>=2.21.0", "memory-profiler>=0.61.0", "matplotlib>=3.8.0", "radon>=6.0.0", "xenon>=0.9.0", "requests>=2.31.0", "importchecker>=2.0", "pydeps>=1.12.0", "monkeytype>=23.3.0", "semgrep>=1.47.0", "build>=1.0.3", "twine>=4.0.2", "pipdeptree>=2.13.0", "pip-audit>=2.6.0", "pylint>=3.0.0", "prospector>=1.10.0", "interrogate>=1.5.0", "vulture>=2.10.0", "zuban>=0.1.0",]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [ "schemas/generated", "archive", ".venv", "__pycache__", "*.pyc", ".git", "build", "dist", "*.egg-info",]

[tool.mypy]
python_version = "3.11"
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
check_untyped_defs = false
disallow_any_generics = false
no_implicit_optional = false
namespace_packages = true
explicit_package_bases = true
pretty = true
show_error_codes = true
exclude = "(schemas/generated|archive|\\.venv|tests/load)"
[[tool.mypy.overrides]]
module = "pheno.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.*"
allow_untyped_defs = true
check_untyped_defs = false

[tool.black]
line-length = 120
target-version = [ "py311",]
exclude = "/(\n    \\.git\n  | \\.mypy_cache\n  | \\.ruff_cache\n  | \\.venv\n  | pheno_vendor\n  | schemas/generated\n  | archive\n  | build\n  | dist\n)/\n"

[tool.isort]
profile = "black"
line_length = 120
skip = [ "pheno_vendor", "schemas/generated", "archive", ".venv",]
known_first_party = [ "lib", "tools", "config", "server", "utils", "schemas", "src",]

[tool.bandit]
exclude_dirs = [ "tests", "pheno_vendor", "lib-sdks", "archive", ".venv",]
skips = [ "B101",]

[tool.vulture]
paths = [ "atoms_cli.py", "lib", "config", "server", "scripts", "src", "utils",]
exclude = [ "pheno_vendor", "lib-sdks", "archive", ".venv", "tests",]
min_confidence = 80
ignore_names = [ "main", "cli", "settings",]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = false
ignore-semiprivate = false
ignore-private = false
ignore-property-decorators = false
ignore-module = false
ignore-nested-functions = false
ignore-nested-classes = true
ignore-setters = false
fail-under = 80
exclude = [ "pheno_vendor", "schemas/generated", "archive", ".venv", "tests",]
verbose = 1
quiet = false
whitelist-regex = []
color = true

[tool.pydantic-settings]
config_file = "config.yaml"
config_file_encoding = "utf-8"
env_prefix = "ATOMS_"
env_file_encoding = "utf-8"
env_nested_delimiter = "__"
case_sensitive = false
env_ignore_empty = true
env_parse_none_str = "None"

[tool.hatch.metadata]
allow-direct-references = true

[tool.ruff.lint]
select = [ "E", "W", "F", "I", "UP", "B", "C4", "DTZ", "T10", "EM", "ISC", "ICN", "PIE", "PYI", "PT", "Q", "RSE", "RET", "SIM", "TID", "TCH", "ARG", "PTH", "PL", "TRY", "RUF",]
ignore = [ "E501", "PLR0913", "PLR2004", "TRY003", "EM101", "EM102", "PLR0912", "PLR0915", "PLR0911",]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false

[tool.ty.src]
include = [ ".",]
exclude = [ "tests/load", "archive", ".venv",]

[tool.ty.environment]
extra-paths = [ ".",]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers"
testpaths = [ "tests",]
python_files = [ "test_*.py",]
python_classes = [ "Test*",]
python_functions = [ "test_*",]
markers = [ "unit: Unit tests", "integration: Integration tests", "e2e: End-to-end tests", "slow: Slow running tests",]

[tool.coverage.run]
source = [ "lib", "tools", "config", "server", "utils", "schemas", "src",]
omit = [ "*/tests/*", "*/test_*.py", "schemas/generated/*", "archive/*", ".venv/*",]
branch = true

[tool.coverage.report]
exclude_lines = [ "pragma: no cover", "def __repr__", "if TYPE_CHECKING:", "raise AssertionError", "raise NotImplementedError", "if __name__ == .__main__.:", "@abstractmethod",]
precision = 2
show_missing = true

[tool.uv.sources]

[tool.uv.pip]
python = "python3.11"
index-url = "https://pypi.org/simple"
compile-bytecode = true

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = [ "S101", "ARG001", "PLR2004",]
"lib/deployment_checker.py" = [ "T201", "S603", "S607", "PLR2004",]
"lib/schema_sync.py" = [ "T201", "S608", "PLR0912", "PLR0915", "PLR2004",]
"schemas/sync/core.py" = [ "T201", "S608", "PLR0912", "PLR0915", "PLR2004",]
"scripts/*.py" = [ "T201",]
"**/__init__.py" = [ "F401",]
"schemas/generated/**/*.py" = [ "ALL",]
"archive/**/*.py" = [ "ALL",]

[tool.ruff.lint.isort]
known-first-party = [ "lib", "tools", "config", "server", "utils", "schemas", "src",]
section-order = [ "future", "standard-library", "third-party", "first-party", "local-folder",]

[tool.hatch.build.targets.wheel]
packages = [ "lib", "tools", "schemas", "tests", "config", "server", "utils", "src",]
