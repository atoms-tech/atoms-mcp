# Cloud Run service configuration
# Deploy with: gcloud run services replace cloudrun.yaml

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: atoms-mcp-server
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/ingress-status: all
spec:
  template:
    metadata:
      annotations:
        # Scaling
        autoscaling.knative.dev/minScale: '0'
        autoscaling.knative.dev/maxScale: '10'
        
        # CPU allocation
        run.googleapis.com/cpu-throttling: 'true'
        
        # Startup probe
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      # Service account (create this in GCP)
      # serviceAccountName: atoms-mcp-sa@PROJECT_ID.iam.gserviceaccount.com
      
      # Timeout (max 3600s = 1 hour)
      timeoutSeconds: 300
      
      # Container configuration
      containers:
      - name: atoms-mcp-server
        # Image will be built by Cloud Build
        image: us-central1-docker.pkg.dev/PROJECT_ID/atoms-mcp/server:latest
        
        # Resources
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
        
        # Ports
        ports:
        - name: http1
          containerPort: 8080
        
        # Environment variables
        env:
        - name: ATOMS_FASTMCP_TRANSPORT
          value: http
        - name: ATOMS_FASTMCP_HTTP_PATH
          value: /api/mcp
        - name: PYTHONUNBUFFERED
          value: '1'
        
        # Secrets from Secret Manager
        - name: SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: SUPABASE_URL
              key: latest
        - name: SUPABASE_KEY
          valueFrom:
            secretKeyRef:
              name: SUPABASE_KEY
              key: latest
        - name: WORKOS_API_KEY
          valueFrom:
            secretKeyRef:
              name: WORKOS_API_KEY
              key: latest
        - name: WORKOS_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: WORKOS_CLIENT_ID
              key: latest
        - name: WORKOS_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: WORKOS_REDIRECT_URI
              key: latest
        
        # Startup probe
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          timeoutSeconds: 1
          periodSeconds: 3
          failureThreshold: 10
        
        # Liveness probe
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 0
          timeoutSeconds: 1
          periodSeconds: 10
          failureThreshold: 3
  
  traffic:
  - percent: 100
    latestRevision: true

