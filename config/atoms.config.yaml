# Atoms MCP Server - Configuration Settings (non-sensitive)

# Server configuration
server:
  host: "0.0.0.0"
  port: 8000
  debug: false
  telemetry: true

# Tunnel configuration (pheno-sdk manages credentials centrally)
tunnel:
  enabled: true
  hostname: "atomcp.kooshapari.com"
  health_interval: 30

# FastMCP configuration
fastmcp:
  transport: "http"
  host: "127.0.0.1"
  port: null  # Allow runtime allocation via pheno-sdk when available
  http_path: "/api/mcp"
  base_url: "https://atomcp.kooshapari.com"
  tools: ["entity", "query", "workflow"]
  authkit_domain: "https://decent-hymn-17-staging.authkit.app"
  authkit_required_scopes: ["openid", "profile", "email"]

# HTTP authentication configuration
auth:
  mode: "required"
  public_base_url: "https://atomcp.kooshapari.com"
  server_auth: "fastmcp.server.auth.providers.workos.AuthKitProvider"

# Resource limits
resources:
  max_memory_mb: 512
  max_connections: 100
  timeout_seconds: 30

# Logging configuration
logging:
  level: "INFO"
  format: "json"
  max_file_size_mb: 100

# Health check configuration
health:
  endpoint: "/health"
  timeout_seconds: 5
  retry_attempts: 3
  health_interval: 30

# Supabase configuration
supabase:
  url: "https://ydogoylwenufckscqijp.supabase.co"

# Vertex AI configuration (Gemini embeddings only)
vertex:
  use_application_default: true
  project: "serious-mile-462615-a2"
  location: "us-central1"
  embeddings_model: "gemini-embedding-001"
  model_discovery_enabled: true
  model_cache_ttl: "3600s"

# KInfra configuration
kinfra:
  enabled: true
  project_name: "atoms-mcp"
  preferred_port: 8000
  domain: "atomcp.kooshapari.com"
  enable_tunnel: true
